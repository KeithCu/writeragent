rules:
  - id: uno-off-main-thread
    mode: taint
    languages: [python]
    severity: ERROR
    message: >-
      UNO accessed from a background context. Marshal via
      execute_on_main_thread()/post_to_main_thread(). See
      docs/uno-thread-safety-enforcement.md (Layer C).
    pattern-sources:
      # Explicit blue marker (module-level worker entrypoints).
      - patterns:
          - pattern-inside: |
              @background
              def $F(...):
                ...
          - pattern: $X
      # Lambda passed as first arg to run_in_background.
      - patterns:
          - pattern-inside: |
              run_in_background($W, ...)
          - pattern-either:
              - pattern: |
                  lambda: $BODY
              - pattern: |
                  lambda $A: $BODY
          - focus-metavariable: $W
      # Nested worker: taint only the body of $F when run_in_background($F) lives in the same outer def.
      - patterns:
          - pattern-inside: |
              def $F(...):
                ...
          - pattern: $X
          - pattern-inside: |
              def $OUTER(...):
                ...
                run_in_background($F, ...)
    pattern-sinks:
      - pattern-either:
          - pattern: get_ctx(...)
          - pattern: get_desktop(...)
          - pattern: get_active_document(...)
          - pattern: get_toolkit(...)
          - pattern: get_package_info(...)
          - pattern: get_extension_url(...)
          - pattern: get_extension_path(...)
          - pattern: process_events_to_idle(...)
          - pattern: focus_preserved(...)
          - pattern: resolve_document_by_url(...)
          - pattern: get_document_context_for_chat(...)
          - pattern: get_calc_context_for_chat(...)
          - pattern: get_draw_context_for_chat(...)
          - pattern: get_document_uno_services(...)
          - pattern: get_document_type(...)
          - pattern: get_full_document_text(...)
          - pattern: get_document_end(...)
          - pattern: get_document_length(...)
          - pattern: get_text_cursor_at_range(...)
          - pattern: get_selection_range(...)
          - pattern: get_paragraph_ranges(...)
          - pattern: build_heading_tree(...)
          - pattern: ensure_heading_bookmarks(...)
          - pattern: resolve_locator(...)
          - pattern: get_string_without_tracked_deletions(...)
          - pattern: get_document_property(...)
          - pattern: set_document_property(...)
          - pattern: get_runtime_uid(...)
          - pattern: get_document_path(...)
          - pattern: insert_html_fragment_at_cursor(...)
          - pattern: insert_content_at_position(...)
          - pattern: replace_full_document(...)
          - pattern: replace_single_range_with_content(...)
          - pattern: replace_preserving_format(...)
          - pattern: apply_paragraph_style_preserving_direct_char(...)
    pattern-sanitizers:
      - pattern: execute_on_main_thread(...)
      - pattern: post_to_main_thread(...)

  - id: raw-uno-thread-ban
    languages: [python]
    severity: ERROR
    message: >-
      Spawn background work via run_in_background, not raw threading.Thread/Timer.
      See docs/uno-thread-safety-enforcement.md (Layer C).
    pattern-either:
      - pattern: threading.Thread(...)
      - pattern: threading.Timer(...)
      - pattern: Thread(...)
      - pattern: Timer(...)
    paths:
      exclude:
        - "**/plugin/contrib/**"
        - "**/plugin/framework/worker_pool.py"
        - "**/plugin/framework/async_stream.py"
        - "**/plugin/contrib/cdp/browser_supervisor.py"
        - "**/plugin/scripting/venv_worker.py"
        - "**/plugin/scripting/venv/editor_main.py"
        - "**/plugin/writer/locale/grammar_work_queue.py"
        - "**/plugin/chatbot/dialog_views.py"
        - "**/plugin/calc/python/function.py"

  - id: background-worker-missing-decorator
    languages: [python]
    severity: WARNING
    message: >-
      Module-level worker passed to run_in_background should be decorated @background
      so Opengrep can track cross-file UNO taint. See docs/uno-thread-safety-enforcement.md.
    patterns:
      - pattern: run_in_background($F, ...)
      - pattern-not-inside: |
          @background
          def $F(...):
            ...
      - pattern-not-inside: |
          def $OUTER(...):
            ...
            def $F(...):
              ...
            ...
            run_in_background($F, ...)
    paths:
      exclude:
        - "**/tests/**"
        - "**/plugin/tests/**"

  - id: uno-source-needs-main-thread-decorator
    languages: [python]
    severity: WARNING
    message: >-
      UNO source getter should be decorated @main_thread_only (Layer A/C alignment).
    paths:
      include:
        - "**/plugin/framework/uno_context.py"
    patterns:
      - pattern: |
          def $F(...):
            ...
      - metavariable-regex:
          metavariable: $F
          regex: ^get_
      - pattern-not-inside: |
          @main_thread_only
          def $F(...):
            ...
      - pattern-not: |
          def get_extension_path(...):
            ...
