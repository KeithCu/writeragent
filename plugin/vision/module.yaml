name: vision
title: Vision / OCR
requires: [config]

settings_tab: false

config_dialog:
  id: VisionSettingsDialog
  library: WriterAgentDialogs
  title: Vision / OCR Settings
  width: 350
  height: 170
  moveable: true
  resizeable: true
  modeless: true
  buttons: [apply, ok, close]

actions:
  open_settings:
    title: Vision OCR Settings…

config:
  images_scale:
    type: float
    default: 1.0
    min: 0.5
    max: 3.0
    widget: number
    page: general
    label: Image scale
    helper: Upscale before OCR/layout. Try 2.0 for small screenshots.

  worker_timeout_sec:
    type: int
    default: 300
    min: 30
    max: 600
    widget: number
    page: general
    label: Worker timeout (seconds)
    helper: Host subprocess limit for Vision Helpers (first model download).

  artifacts_path:
    type: string
    default: ""
    widget: text
    page: general
    label: Docling artifacts path
    helper: Optional folder from docling-tools models download (offline use).

  text_score:
    type: float
    default: 0.5
    min: 0.0
    max: 1.0
    widget: number
    page: ocr
    label: OCR confidence threshold
    helper: RapidOCR minimum text score. Raise to reduce garbage text.

  force_full_page_ocr:
    type: boolean
    default: true
    widget: checkbox
    page: ocr
    label: OCR entire image
    helper: Recommended for embedded graphics exported from LibreOffice.

  table_mode:
    type: string
    default: accurate
    widget: select
    page: tables
    label: Table extraction mode
    options:
      - {value: accurate, label: Accurate (default)}
      - {value: fast, label: Fast}

  do_cell_matching:
    type: boolean
    default: true
    widget: checkbox
    page: tables
    label: Table cell matching
    helper: Align detected table cells with content (extract_structure).

  create_orphan_clusters:
    type: boolean
    default: true
    widget: checkbox
    page: tables
    label: Keep orphan text clusters
    helper: Group unassigned text into clusters for messy layouts.

  insert_mode:
    type: string
    default: html
    widget: select
    page: tables
    label: Document insert mode
    helper: html = Docling HTML import (default). structured = bbox column layout in Writer; native Calc cells for extract_structure tables.
    options:
      - {value: html, label: Standard HTML}
      - {value: structured, label: Structured (layout / cell grid)}

  layout_model:
    type: string
    default: heron
    widget: select
    page: advanced
    label: Layout model
    options:
      - {value: heron, label: Heron (default)}
      - {value: egret_large, label: Egret large (slower, complex docs)}

  do_formula_enrichment:
    type: boolean
    default: false
    widget: checkbox
    page: advanced
    label: Extract formulas (LaTeX)
    helper: Opt-in. Downloads extra VLM models on first use; slower.

  do_code_enrichment:
    type: boolean
    default: false
    widget: checkbox
    page: advanced
    label: Code block enrichment
    helper: Specialized OCR for code/terminal screenshots.

  document_timeout:
    type: float
    default: 0
    min: 0
    max: 600
    widget: number
    page: advanced
    label: Docling document timeout (s)
    helper: Per-conversion timeout inside Docling. 0 = no limit.

