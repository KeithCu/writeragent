<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Localized title arrives via the IPC load message; see editor.js applyLoadMessage -->
  <title> </title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="toolbar">
    <button type="button" id="btn-run" class="toolbar-hidden">Run</button>
    <button type="button" id="btn-save">Save</button>
    <button type="button" id="btn-cancel">Cancel</button>
    
    <!-- Premium Script Selector & Actions (only visible in run_script mode) -->
    <div id="script-manager-container" class="toolbar-hidden">
      <label for="script-select">Script:</label>
      <select id="script-select">
        <option value="">Sample</option>
      </select>
      <button type="button" id="btn-save-as">Save As...</button>
      <button type="button" id="btn-delete-script" class="toolbar-hidden">Delete</button>
    </div>

    <label id="plain-text-save-label" class="toolbar-check toolbar-hidden">
      <input type="checkbox" id="chk-plain-text" />
      <span id="plain-text-save-text">Save as plain text</span>
    </label>
    <label id="data-binding-label" class="data-binding-label toolbar-hidden" for="data-binding-input">Data:</label>
    <input type="text" id="data-binding-input" class="toolbar-hidden" placeholder="A1:C1  or  A1:C1, C1:C5" spellcheck="false" />
    <span id="status"></span>
  </header>
  <div id="editor"></div>
  <script src="vs/loader.js"></script>
  <script src="editor.js"></script>
  <script src="scripts_manager.js"></script>
</body>
</html>
