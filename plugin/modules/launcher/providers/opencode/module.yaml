title: OpenCode CLI provider
requires: [launcher_manager]
config_inline: true

config:
  handle_config:
    type: boolean
    default: true
    widget: checkbox
    label: Handle Ollama Config
    helper: "Inject Ollama provider settings into opencode.json. Uncheck to manage config yourself."
  ollama_url:
    type: string
    default: "http://localhost:11434/v1"
    widget: text
    label: Ollama URL
    helper: "Ollama API endpoint."
  ollama_model:
    type: string
    default: "qwen3:8b"
    widget: select
    options_provider: "plugin.modules.launcher.providers.opencode:get_ollama_models"
    label: Ollama Model
    helper: "Select an installed model. Custom values are preserved if typed in config."
