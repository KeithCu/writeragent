name: ai
title: AI provider registry and model catalog
requires: [config, events]
provides_services: [ai]
tools:
  - plugin.modules.ai.tools:WebResearchTool
  - plugin.modules.ai.tools:GenerateImageTool
  - plugin.modules.ai.tools:EditImageTool

config:
  endpoint:
    type: string
    default: "http://127.0.0.1:5000"
    widget: combo
    label: "Endpoint"
    helper: "Base URL of your OpenAI-compatible chat server."
    options_provider: "plugin.modules.core.services.config:get_endpoint_options"
  text_model:
    type: string
    default: ""
    widget: combo
    label: "Text model"
    helper: "Model ID for chat/edit; recent models are remembered per endpoint."
    options_provider: "plugin.modules.core.services.config:get_text_model_options"
  image_model:
    type: string
    default: ""
    widget: combo
    label: "Image model"
    helper: "Image model when using the same endpoint for image generation."
    options_provider: "plugin.modules.core.services.config:get_image_model_options"
  api_key:
    type: string
    default: ""
    widget: password
    label: "API key"
    helper: "Stored per endpoint; leave blank if your endpoint does not require a key."
  api_type:
    type: string
    default: chat
    widget: select
    label: "API type"
    options:
      - value: chat
        label: "Chat (recommended)"
      - value: completions
        label: "Completions (legacy)"
  openai_compatibility:
    type: boolean
    default: true
    widget: checkbox
    label: "OpenAI-compatible endpoint"
    helper: "Disable only if your endpoint does not follow the OpenAI API."
  temperature:
    type: float
    default: 0.5
    min: 0.0
    max: 2.0
    widget: slider
    label: "Temperature"
  chat_max_tokens:
    type: int
    default: 16384
    widget: number
    label: "Chat max tokens"
  chat_context_length:
    type: int
    default: 8000
    widget: number
    label: "Chat context length (characters)"
  request_timeout:
    type: int
    default: 120
    widget: number
    label: "Request timeout (seconds)"
  additional_instructions:
    type: string
    default: ""
    widget: textarea
    label: "Additional instructions"
