name: chatbot
title: Sidebar
requires: [document, config, events, http_routes]
tools:

actions:
  extend_selection:
    title: "Extend Selection"
  edit_selection:
    title: "Edit Selection"

config:
  max_tool_rounds:
    type: int
    default: 15
    min: 1
    max: 50
    widget: number
    label: Max Tool Rounds

  context_strategy:
    type: string
    default: "auto"
    widget: select
    label: Document Context Strategy
    helper: "How much document content to include in LLM context"
    options:
      - value: auto
        label: Auto (by document size)
      - value: full
        label: Full document text
      - value: page
        label: Pages around cursor
      - value: tree
        label: Outline + excerpt
      - value: stats
        label: Stats + outline only

  extend_selection_max_tokens:
    type: int
    default: 1000
    min: 10
    max: 4096
    widget: number
    label: Extend max tokens
    inline: true
    x: 110
    width: 100

  edit_selection_max_new_tokens:
    type: int
    default: 1000
    min: 0
    max: 4096
    widget: number
    label: Edit extra tokens
    helper: "Extra tokens beyond original text length. 0 = same length as original."
    label_x: 220
    label_width: 100
    x: 322
    width: 100

#  tool_broker:
#    type: boolean
#    default: true
#    widget: checkbox
#    label: Tool Broker
#    helper: "Two-tier tool delivery: LLM gets core tools first, activates others by intent"

  web_research_cache_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Web Research Cache
    helper: "Cache completed web research reports by normalized query (uses web cache database)."
    inline: true
    x: 8
    width: 200

  show_search_thinking:
    type: boolean
    default: false
    internal: true

  prompt_for_web_research:
    type: boolean
    default: false
    widget: checkbox
    label: Prompt for Web Research
    helper: "Ask for confirmation before sending a web search query"
    x: 220
    width: 200

  web_research_browser:
    type: string
    default: "off"
    widget: select
    label: Web Research Browser
    helper: "Select the browser backend to use for webpage visits during research (Off uses static HTTP requests)."
    options:
      - value: "off"
        label: "Off (Static HTTP)"
      - value: "firefox"
        label: "Firefox (CDP)"
      - value: "chromium"
        label: "Chromium (CDP)"
      - value: "chrome"
        label: "Chrome (CDP)"

  web_cache_max_mb:
    type: int
    default: 50
    min: 0
    max: 500
    widget: number
    label: Cache max (MB)
    helper: "Max disk size for web search cache (0 to disable)"
    inline: true
    x: 110
    width: 100

  web_cache_validity_days:
    type: int
    default: 30
    min: 1
    max: 30
    widget: number
    label: Cache validity (days)
    helper: "How many days cache entries should be considered valid."
    label_x: 220
    label_width: 100
    x: 322
    width: 100

  web_research_cache_jaccard_percent:
    type: int
    default: 40
    min: 0
    max: 100
    widget: number
    label: Research Cache Fuzzy Match (%)
    helper: "Minimum similarity (0-100) for a fuzzy cache hit. JSON only (internal); default 40."
    internal: true

  web_research_cache_min_overlap:
    type: int
    default: 8
    min: 0
    max: 50
    widget: number
    label: Research Cache Min Stem Overlap
    helper: "Minimum shared stem count for a fuzzy cache hit (0 disables). JSON only (internal); default 8."
    internal: true

#  api_enabled:
#    type: boolean
#    default: false
#    widget: checkbox
#    label: Enable Chat API
#    helper: "Expose /api/chat endpoints on the HTTP server"
#    public: true

  # api_auth_token:
  #   type: string
  #   default: ""
  #   widget: text
  #   label: API Auth Token
  #   helper: "Optional Bearer token for researchers/external apps. Empty = no auth."

  rich_text_control_sidebar:
    type: boolean
    default: true
    widget: checkbox
    label: Rich Text Control Sidebar
    helper: "Formatted chat via RichTextControl (on by default). Requires restart. Uncheck for plain-text chat only."

  humanizer_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Humanizer skill (natural prose)
    helper: "When enabled, injects guidance into the system prompt so the model makes generated or revised document text sound more natural and human (removes AI slop patterns). Edit the rules in your LibreOffice profile under writeragent/skills/humanizer/SKILL.md (the file is auto-created on first use). A dedicated Skills tab can be added later."

  query_history:
    type: string
    default: "[]"
    internal: true
