<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PYTHON Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="toolbar">
    <button type="button" id="btn-save">Save</button>
    <button type="button" id="btn-cancel">Cancel</button>
    <label id="plain-text-save-label" class="toolbar-check">
      <input type="checkbox" id="chk-plain-text" />
      <span id="plain-text-save-text">Save as plain text</span>
    </label>
    <label id="data-binding-label" class="data-binding-label" for="data-binding-input">Data:</label>
    <input type="text" id="data-binding-input" placeholder="A1:C1  or  A1:C1, C1:C5" spellcheck="false" />
    <span id="status"></span>
  </header>
  <div id="editor"></div>
  <script src="vs/loader.js"></script>
  <script src="editor.js"></script>
</body>
</html>
