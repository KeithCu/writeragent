name: scripting
title: Python
requires: [config]

actions:
  reset_python_session:
    title: "Reset Python Session"

config:
  python_venv_path:
    type: string
    default: ""
    widget: text
    label: Python venv path
    helper: If set, runs tools in that venv (bin/python or Scripts/python.exe). If empty, run_venv_python_script uses this process's sys.executable (basic stdlib); use a venv for numpy/pandas.
    width: 200
    inline: true

  test_venv:
    type: string
    default: ""
    widget: button
    label: Test
    inline_no_label: true
    settings_persist: false
    x: 314
    width: 48

  python_exec_timeout:
    type: int
    default: 10
    min: 1
    max: 600
    widget: number
    label: Python script timeout (seconds)
    helper: Wall-clock limit for Run Python Script, =PYTHON(), and run_venv_python_script.

  python_max_data_cells:
    type: int
    default: 250000
    min: 1000
    max: 2000000
    widget: number
    label: Max Calc data cells
    helper: Maximum cells in =PYTHON() data or Run Python Script data/data_range. Larger values use more RAM and time; UNO range read still dominates.
    public: true

  python_session_mode:
    type: string
    default: isolated
    widget: select
    label: Python session mode
    helper: "Isolated: each =PYTHON() cell gets a fresh namespace. Shared: one namespace per workbook (variables carry between cells)."
    public: true
    options:
      - value: isolated
        label: Isolated (default)
      - value: shared
        label: Shared kernel

  force_internal_script_editor:
    type: bool
    default: false
    widget: checkbox
    label: Force internal script editor
    helper: If checked, bypasses the Monaco script editor and uses the LibreOffice dialog.

  native_run_script_modeless:
    type: bool
    default: true
    widget: checkbox
    label: Modeless Run Python Script dialog
    helper: When checked, the plain-text Run Python Script dialog floats so you can edit the document while it is open. Uncheck for the classic modal dialog.
