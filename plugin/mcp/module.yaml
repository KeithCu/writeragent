name: mcp
title: MCP
provides_services: [http_routes]
requires: [config, events]

config:
  mcp_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Enable MCP Server
    helper: Localhost only, no auth. Clients use http://localhost:<port>/mcp (streamable HTTP).
    public: true
  mcp_port:
    type: int
    default: 8765
    min: 1024
    max: 65535
    widget: number
    label: MCP Port
    public: true
  cors_allow_private_origins:
    type: boolean
    default: true
    widget: checkbox
    label: Allow CORS from local origins
    helper: "Automatic for .local, .lan, .home.arpa, .internal, and LAN IPs in the browser Origin. For other hosts, add mcp.cors_allowed_origins in writeragent.json."
    public: true
  cors_allowed_origins:
    type: list
    default: []
    internal: true
