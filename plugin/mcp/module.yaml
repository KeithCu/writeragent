name: mcp
title: MCP
provides_services: [http_routes]
requires: [config, events]

config:
  mcp_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Enable MCP Server
    helper: Localhost only, no auth. Clients use http://localhost:<port>/mcp (streamable HTTP).
    public: true
  mcp_port:
    type: int
    default: 8765
    min: 1024
    max: 65535
    widget: number
    label: MCP Port
    public: true
  cors_allowed_origins:
    type: list
    default: []
    internal: true
  cors_allowed_origin:
    type: string
    default: ""
    widget: text
    label: Additional CORS origin
    helper: "Browser clients only (e.g. https://localai.local). Stored in mcp.cors_allowed_origins; add more entries in writeragent.json."
    public: true
