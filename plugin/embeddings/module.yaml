name: embeddings
title: Embeddings
requires: [config]
config:
  folder_search_mode:
    type: string
    default: none
    widget: select
    label: Cross-file search mode
    helper: "How document_research discovers content across nearby files. None: grep_nearby_files only. Embeddings: search_embeddings + grep_nearby_files (requires Settings → Python venv with sentence-transformers, chromadb, langgraph, langchain-core, langchain-text-splitters, envwrap; see Settings → Python Test). SQLite FTS (venv): search_nearby_files only — replaces slow in-proc grep (index via stdlib sqlite3 in the embeddings venv worker)."
    options:
      - value: none
        label: None
      - value: embeddings
        label: Embeddings
      - value: fts
        label: SQLite FTS (venv)

  embedding_provider:
    type: string
    default: local
    widget: select
    label: Embedding Provider
    helper: "local (sentence-transformers in venv) or endpoint (configured remote/local endpoint)"
    options:
      - value: local
        label: "Local (venv)"
      - value: endpoint
        label: "Endpoint"
  embedding_model:
    type: string
    default: "all-MiniLM-L6-v2"
    widget: text
    label: Embedding Model
    helper: "HuggingFace model ID for local provider, or endpoint-specific model ID"
