name: embeddings
title: Embeddings
requires: [config]
config:
  folder_search_mode:
    type: string
    default: none
    widget: select
    label: Cross-file search
    helper: "Indexed semantic + keyword search for document_research (corpus.db). Requires embeddings venv — see Python Test."
    options:
      - value: none
        label: "Off"
      - value: hybrid
        label: Embeddings + FTS

  embedding_provider:
    type: string
    default: local
    widget: select
    label: Embedding Provider
    helper: "local (sentence-transformers in venv) or endpoint (configured remote/local endpoint)"
    options:
      - value: local
        label: "Local (venv)"
      - value: endpoint
        label: "Endpoint"
  embedding_model:
    type: string
    default: "all-MiniLM-L6-v2"
    widget: text
    label: Embedding Model
    helper: "HuggingFace model ID for local provider, or endpoint-specific model ID"
