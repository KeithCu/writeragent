name: embeddings
title: Embeddings
requires: [config]
config:
  folder_search_mode:
    type: string
    default: none
    widget: select
    label: Cross-file search mode
    helper: "Cross-file search for document_research. Requires embeddings venv — see Python Test."
    options:
      - value: none
        label: None
      - value: embeddings
        label: Embeddings
      - value: fts
        label: SQLite FTS (venv)
      - value: hybrid
        label: Hybrid (FTS + embeddings)

  embedding_provider:
    type: string
    default: local
    widget: select
    label: Embedding Provider
    helper: "local (sentence-transformers in venv) or endpoint (configured remote/local endpoint)"
    options:
      - value: local
        label: "Local (venv)"
      - value: endpoint
        label: "Endpoint"
  embedding_model:
    type: string
    default: "all-MiniLM-L6-v2"
    widget: text
    label: Embedding Model
    helper: "HuggingFace model ID for local provider, or endpoint-specific model ID"
