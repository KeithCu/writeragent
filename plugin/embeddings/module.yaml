name: embeddings
title: Embeddings
requires: [config]
config:
  embeddings_cache_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Embeddings cache (per-folder semantic search)
    width: 400
    helper: "When on, builds a semantic index in writeragent_embeddings/ beside the active document's folder and also exposes search_embeddings in document_research (grep_nearby_files stays available). Requires Settings → Python venv with sentence-transformers, chromadb, langgraph, langchain-core, langchain-text-splitters, envwrap (see Settings → Python Test)."

  folder_fts_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Folder full-text index (SQLite FTS5)
    width: 400
    helper: "When on, builds fts5.db beside writeragent_embeddings/ via the embeddings Python venv (stdlib sqlite3 only). Exposes search_nearby_files in document_research. Index build runs outside LibreOffice."

  embedding_provider:
    type: string
    default: local
    widget: select
    label: Embedding Provider
    helper: "local (sentence-transformers in venv) or endpoint (configured remote/local endpoint)"
    options:
      - value: local
        label: "Local (venv)"
      - value: endpoint
        label: "Endpoint"
  embedding_model:
    type: string
    default: "all-MiniLM-L6-v2"
    widget: text
    label: Embedding Model
    helper: "HuggingFace model ID for local provider, or endpoint-specific model ID"
